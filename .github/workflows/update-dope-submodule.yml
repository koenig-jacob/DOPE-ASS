name: Update DOPE Submodule

on:
  schedule:
    - cron: '0 * * * *'  # runs every hour
  workflow_dispatch:       # allows manual trigger from GitHub UI

jobs:
  update-submodule:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout DOPE-ASS
        uses: actions/checkout@v4
        with:
          submodules: false
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Init top-level DOPE submodule (non-recursive)
        run: git submodule init DOPE && git submodule update DOPE

      - name: Update DOPE submodule to latest
        run: git submodule update --remote DOPE

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add DOPE
          git diff --staged --quiet || (git commit -m "chore: update DOPE submodule to latest" && git push)

      - name: Neutralize orphaned DOPE/third_party/imgui gitlink
        if: always()
        run: git -C DOPE rm --cached third_party/imgui 2>/dev/null || true
