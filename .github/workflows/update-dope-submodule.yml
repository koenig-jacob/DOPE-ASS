name: Update DOPE Submodule

on:
  schedule:
    - cron: '0 * * * *'  # runs every hour
  workflow_dispatch:       # allows manual trigger from GitHub UI

jobs:
  update-submodule:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout DOPE-ASS with submodules
        uses: actions/checkout@v4
        with:
          submodules: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update DOPE submodule to latest
        run: git submodule update --remote DOPE

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add DOPE
          git diff --staged --quiet || (git commit -m "chore: update DOPE submodule to latest" && git push)
