; ---------------------------------------------------------------------------
; PlatformIO Configuration — DOPE-ASS (Application Software Stack)
;
; Environments:
;   esp32p4  — Target hardware (ESP32-P4, ESP-IDF / FreeRTOS)
;   native   — Desktop unit tests (GoogleTest)
; ---------------------------------------------------------------------------

[platformio]
boards_dir = boards

[env]
lib_extra_dirs =
    DOPE/lib
build_flags =
    -std=gnu++17
    -Wall
    -Wextra
    -DDOPE_ASS_VERSION_MAJOR=0
    -DDOPE_ASS_VERSION_MINOR=1

; ---------------------------------------------------------------------------
; Target: ESP32-P4  (ESP-IDF / FreeRTOS)
; ---------------------------------------------------------------------------
[env:esp32p4]
platform = espressif32
board = esp32-p4-function-ev-board
framework = espidf
board_build.partitions = partitions.csv
build_flags =
    ${env.build_flags}
    -DDOPE_ASS_PLATFORM_ESP32P4
    -DBCE_PLATFORM_ESP32
build_src_filter =
    +<*>
    +<hal/>
    +<drivers/>
    +<app/>
monitor_speed = 115200

; ---------------------------------------------------------------------------
; Desktop: Unit Tests (GoogleTest)
; ---------------------------------------------------------------------------
[env:native]
platform = native
test_build_src = false
test_framework = googletest
lib_ldf_mode = deep+
build_flags =
    -std=c++17
    -DDOPE_ASS_PLATFORM_NATIVE
    -DBCE_PLATFORM_NATIVE
    -DBCE_VERSION_MAJOR=1
    -DBCE_VERSION_MINOR=3
    -Wall
    -Wextra
    -Iinclude
